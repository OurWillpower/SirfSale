<style>
body{margin:0;background:#0a0a0a;color:white;font-family:Arial;}
.topbar{padding:20px;border-bottom:1px solid #222;}
.topbar a{color:gold;text-decoration:none;}
h1{text-align:center;color:gold;margin:30px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:30px;
}

/* CARD */
.card{
background:#111;
border-radius:10px;
overflow:hidden;
border:1px solid #222;
}

/* IMAGE (same size, safer load) */
.card img{
width:100%;
height:200px;
object-fit:cover;
display:block;
}

/* fallback if image fails */
.card img:after{
content:"Image loading...";
color:#777;
display:block;
text-align:center;
padding:80px 0;
}
