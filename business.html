<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Deals | Willpower</title>

<style>
body {
    background: #0b0b0b;
    color: white;
    font-family: 'Segoe UI';
    margin: 0;
}

/* TOP BAR */
.topbar {
    padding: 15px;
}

.home-btn {
    color: gold;
    text-decoration: none;
    font-weight: bold;
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 1100px;
    margin: auto;
    padding: 20px 0;
}

h1 {
    color: gold;
    text-align: center;
}

/* FILTERS */
.filters {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

select {
    padding: 10px;
    border-radius: 6px;
    border: none;
}

/* CARDS */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 20px;
    width: calc(50% - 20px);
}

.card:hover {
    border-color: gold;
}

.card h3 {
    color: gold;
}

.price {
    color: gold;
    font-size: 20px;
    margin-top: 10px;
}

.button {
    background: gold;
    color: black;
    padding: 10px 15px;
    margin-top: 10px;
    display: inline-block;
    border-radius: 6px;
    text-decoration: none;
}

/* WHATSAPP FLOAT */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}

@media (max-width: 768px) {
    .card {
        width: 100%;
    }
}
</style>

<script>
function filterDeals() {
    let location = document.getElementById("locationFilter").value;
    let price = document.getElementById("priceFilter").value;

    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let loc = cards[i].getAttribute("data-location");
        let pr = cards[i].getAttribute("data-price");

        let show = true;

        if (location !== "all" && loc !== location) show = false;
        if (price !== "all" && pr !== price) show = false;

        cards[i].style.display = show ? "block" : "none";
    }
}
</script>

</head>

<body>

<div class="topbar">
<a class="home-btn" href="index.html">← Back to Home</a>
</div>

<div class="container">

<h1>Business for Sale</h1>

<div class="filters">
<select id="locationFilter" onchange="filterDeals()">
<option value="all">All Locations</option>
<option value="goa">Goa</option>
<option value="bangalore">Bangalore</option>
</select>

<select id="priceFilter" onchange="filterDeals()">
<option value="all">All Ticket Sizes</option>
<option value="low">Below ₹20 Cr</option>
<option value="mid">₹20–50 Cr</option>
<option value="high">₹50 Cr+</option>
</select>
</div>

<div class="grid">

<div class="card" data-location="goa" data-price="mid">
<h3>Goa Distillery</h3>
<div class="price">₹42 Cr</div>
<a class="button" href="lead.html">Enquire</a>
</div>

<div class="card" data-location="goa" data-price="mid">
<h3>North Goa Factory</h3>
<div class="price">₹22 Cr</div>
<a class="button" href="lead.html">Enquire</a>
</div>

<div class="card" data-location="goa" data-price="low">
<h3>South Goa Unit</h3>
<div class="price">₹12 Cr</div>
<a class="button" href="lead.html">Enquire</a>
</div>

<div class="card" data-location="bangalore" data-price="high">
<h3>Bangalore Distillery</h3>
<div class="price">₹125 Cr</div>
<a class="button" href="lead.html">Enquire</a>
</div>

</div>

</div>

<!-- WHATSAPP -->
<a class="whatsapp-float" href="https://wa.me/917039196489" target="_blank">💬</a>

</body>
</html>
