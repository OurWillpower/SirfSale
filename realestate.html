<!DOCTYPE html>
<html>

<title>Real Estate Deals</title>

<style>
body { background:#0b0b0b; color:white; font-family:'Segoe UI'; margin:0; }

.topbar { padding:15px; }
.topbar a { color:gold; text-decoration:none; }

.container { width:90%; margin:auto; }

h1 { color:gold; text-align:center; }

.filters {
display:flex; gap:10px; justify-content:center;

}

input, select {

.grid {
display:flex; flex-wrap:wrap; gap:20px;

.card {
background:#111; border:1px solid #222;
padding:20px; border-radius:10px;

}

.card:hover { border-color:gold; }

.price { color:gold; font-size:20px; }

.button {
background:gold; color:black;
padding:10px; display:inline-block;
margin-top:10px; border-radius:6px;
text-decoration:none;
}

/* WhatsApp */
.whatsapp {
position:fixed; bottom:20px; right:20px;
background:#25D366; color:white;
padding:15px; border-radius:50%;
}

@media(max-width:768px){ .card{ width:100%; } }
</style>

</head>

<div class="topbar">
<a href="index.html">← Back to Home</a>

</div>
