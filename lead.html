<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>List Your Deal</title>

<style>
body { background:#000; color:white; font-family:'Segoe UI'; margin:0; }

.topbar { padding:15px; }
.topbar a { color:gold; }

.container { width:90%; max-width:600px; margin:auto; padding:30px; }

h2 { color:gold; }

input, textarea {
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

button {
background:gold;
padding:12px;
border:none;
font-weight:bold;
cursor:pointer;
}
</style>

<script>
function submitDeal() {
var name = document.getElementById("name").value;
var title = document.getElementById("title").value;
var price = document.getElementById("price").value;

var msg = "New Deal Listing:%0AName: " + name +
"%0ADeal: " + title +
"%0APrice: ₹" + price;

window.location.href = "https://wa.me/917039196489?text=" + msg;
}
</script>

</head>

<body>

<div class="topbar">
<a href="index.html">← Home</a>
</div>

<div class="container">

<h2>List Your Deal</h2>

<input id="name" placeholder="Your Name">
<input id="title" placeholder="Deal Title">
<input id="location" placeholder="Location">
<input id="price" placeholder="Expected Price (₹)">

<textarea placeholder="Describe your deal"></textarea>

<label>Upload Deal Photos (2–3 images)</label>
<input type="file" multiple>

<button onclick="submitDeal()">Submit Deal</button>

</div>

</body>
</html>
