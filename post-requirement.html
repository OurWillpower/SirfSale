<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Post Requirement</title>

<style>
body { background:#000; color:white; font-family:'Segoe UI'; }

.container { width:90%; max-width:600px; margin:auto; padding:40px; }

input, select, textarea {
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

button {
background:gold;
padding:12px;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2 style="color:gold;">Post Your Requirement</h2>

<input placeholder="Your Name">
<select>
<option>Investor</option>
<option>Broker</option>
<option>Builder</option>
</select>

<input placeholder="Budget (₹)">
<input placeholder="Location Preference">
<textarea placeholder="What are you looking for?"></textarea>

<button onclick="alert('We will contact you shortly')">Submit</button>

</div>

</body>
</html>
